answer_callback:
  name: Answer callback
  description: Answer an inline button click
  fields:
    query_id:
      name: Query ID
      description: Callback query ID
      required: true
      selector:
        text:
    text:
      name: Text
      description: Notification text
      required: false
      selector:
        text:
    show_alert:
      name: Show as alert
      description: Alert window instead of toast
      required: false
      default: false
      selector:
        boolean:
    url:
      name: URL
      description: Link to open
      required: false
      selector:
        text: