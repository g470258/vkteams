edit_message:
  name: Edit message
  description: Edit an existing message
  fields:
    message_id:
      name: Message ID
      description: ID of message to edit
      required: true
      selector:
        number:
    message:
      name: New text
      description: New message content
      required: true
      selector:
        text:
          multiline: true
    entity_id:
      name: entity_id
      description: Notify entity (optional)
      required: false
      selector:
        entity:
          domain: notify
          integration: vkteams
    chat_id:
      name: chat_id
      description: Chat ID (alternative to entity_id)
      required: false
      selector:
        text:
    parse_mode:
      name: Parse mode
      description: HTML or MarkdownV2
      required: false
      selector:
        select:
          options: ["HTML", "MarkdownV2"]
    buttons:
      name: Inline buttons
      description: New buttons (empty array to remove)
      required: false
      selector:
        object:

