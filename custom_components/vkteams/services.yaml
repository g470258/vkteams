send_message:
  name: Send message
  description: Send a text message via VK Teams bot
  fields:
    message:
      name: Message
      description: Message text
      required: true
      selector:
        text:
          multiline: true
    entity_id:
      name: entity_id
      description: Notify entities (optional)
      required: false
      selector:
        entity:
          domain: notify
          integration: vkteams
          multiple: true
    chat_id:
      name: chat_id
      description: Chat ID (alternative to entity_id)
      required: false
      selector:
        text:
          multiple: true
    title:
      name: Title
      description: Will be shown in bold
      required: false
      selector:
        text:
    parse_mode:
      name: Parse mode
      description: HTML or MarkdownV2
      required: false
      selector:
        select:
          options: ["HTML", "MarkdownV2"]
    buttons:
      name: Inline buttons
      description: List of buttons or list of rows for grid layout
      required: false
      selector:
        object:
    disable_notification:
      name: Silent
      description: Send without notification
      required: false
      selector:
        boolean:

