answer_callback:
  name: Answer callback
  description: Answer a callback query from a button click
  fields:
    query_id:
      name: Query ID
      description: Callback query ID from the event
      required: true
      selector:
        text:
    text:
      name: Notification text
      description: Text to show in notification
      required: false
      selector:
        text:
    show_alert:
      name: Show as alert
      description: Show as alert window instead of toast
      required: false
      default: false
      selector:
        boolean:
    url:
      name: URL
      description: URL to open when button is clicked
      required: false
      selector:
        text: