send_message:
  name: Send message
  description: Send a text message via VK Teams bot
  fields:
    message:
      name: Message
      description: Message text
      required: true
      selector:
        text:
          multiline: true
    entity_id:
      name: Notify entities
      description: Notify entities (optional, uses first allowed chat if not specified)
      required: false
      selector:
        entity:
          domain: notify
          integration: vkteams
          multiple: true
    chat_id:
      name: Chat IDs
      description: Direct chat IDs (alternative to entity_id)
      required: false
      selector:
        text:
          multiple: true
    title:
      name: Title
      description: Optional title. Will be formatted as bold in HTML/MarkdownV2 modes
      required: false
      selector:
        text:
    parse_mode:
      name: Parse mode
      description: Message formatting mode. HTML (<b>bold</b>, <i>italic</i>) or MarkdownV2 (*bold*, _italic_)
      required: false
      selector:
        select:
          options: ["HTML", "MarkdownV2"]
    buttons:
      name: Inline buttons
      description: 'Buttons: [{"text": "Button", "callbackData": "data", "style": "primary"}]'
      required: false
      selector:
        object:
    buttons_layout:
      name: Buttons layout
      description: '"row" - horizontal (default), "column" - vertical'
      required: false
      selector:
        select:
          options: ["row", "column"]
    disable_notification:
      name: Disable notification
      description: Send message silently
      required: false
      selector:
        boolean:

